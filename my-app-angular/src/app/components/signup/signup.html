<h2>register</h2>
<form (ngSubmit)="submit()">

  <label>
    Name
    <input [(ngModel)]="name" name="name" type="name"/>
  </label>

  <label>
    Email
    <input [(ngModel)]="email" name="email" type="email"/>
  </label>

  <label>
    Password
    <input [(ngModel)]="password" name="password" type="password"/>
  </label>

  <label>
    Program
    <input [(ngModel)]="program" name="program" type="program"/>
  </label>

  <div class="error">
    {{errorMsg}}
  </div>

  <button type="submit()">Sign Up</button>
  <p>Already has an account (?) <a routerLink="/login">Login</a></p>
</form>
